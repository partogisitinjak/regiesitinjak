<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curhat Dong Mah!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Space Grotesk', sans-serif; line-height: 1.6; overflow-x: hidden; }
        
        .navbar { background-color: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .nav-link { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        
        .line-border { border-top: 1px solid rgba(255,255,255,0.12); width: 100%; }
        .huge-text { font-size: clamp(2.8rem, 7vw, 6.5rem); line-height: 0.9; font-weight: 700; letter-spacing: -3px; text-transform: uppercase; }
        .outline-text { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.4); }
        
        .blog-item { padding: 50px 0; transition: all 0.5s ease; text-decoration: none; color: inherit; display: block; border-bottom: 1px solid rgba(255,255,255,0.12); }
        .blog-item:hover { background: rgba(255,255,255,0.03); }
        
        .label-pill { font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.3); padding: 3px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img.png" alt="Logo" style="width: 38px; filter: grayscale(1);" onerror="this.src='https://via.placeholder.com/50'">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white-50" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="about.html">ABOUT ME</a></li>
                    <li class="nav-item"><a class="nav-link active text-white" href="blog.html">Curhat Dong Mah</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <header class="mb-5 pt-4 text-start">
           <!-- <p class="text-uppercase small mb-4" style="letter-spacing: 2px; color: rgba(255,255,255,0.5);">Regie Sitinjak // Log Data Curhat</p> -->
            <div class="huge-text">CURHAT <br> <span class="outline-text">DONG</span> <br> MAH<span class="text-primary-custom">.</span></div>
        </header>

        <div class="line-border mt-5"></div>

       <section id="blog-container" class="blog-list"></section>
            <div class="blog-item text-start">
                <div class="row align-items-center">
                    <div class="col-md-9 mb-4 mb-md-0">
                        <div class="mb-3">
                            <span class="label-pill">DATA INCOMING</span>
                        </div>
                        <h2 class="fw-bold mb-3" style="font-size: 1.8rem;">Belum ada curhatan di sini.</h2>
                        <p style="color: rgba(255,255,255,0.7); max-width: 600px;">
                            Sedang menunggu curhatan yang asik nih buat ditampilin, tunggu ya bre!
                        </p>
                    </div>
                </div>
            </div>
            </section>

        <footer class="mt-5 py-5 text-start">
            <div class="line-border mb-5"></div>
            <div class="row">
                <div class="col-md-8 mb-4 mb-md-0">
                  <!-- Ini adalah komentar atau pesan catatan
                  <h2 class="fw-bold mb-4">Butuh sistem yang sinematik?</h2>
                    <a href="mailto:regiesitinjak@gmail.com" class="text-white text-decoration-none border-bottom fs-3" style="border-bottom: 2px solid rgba(255,255,255,0.12);">regiesitinjak@gmail.com</a> -->
                </div>
                <div class="col-md-4 text-md-end d-flex flex-column justify-content-end align-items-md-end">
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin:0;">© 2026 Regie Sitinjak</p>
                    <div class="d-flex gap-3 fs-5 mt-2">
                        <a href="instagram.com/g3prg" class="text-white"><i class="bi bi-instagram"></i></a>
                        <a href="https://open.spotify.com/user/314jn5oqcpv2kmso2ajve53oeooi?si=46d1072eba674ca6" class="text-white"><i class="bi bi-spotify"></i></a>
                        <a href="github.com/partogisitinjak" class="text-white"><i class="bi bi-github"></i></a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
<script>
    fetch('posts.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('blog-container');
            container.innerHTML = data.map(post => `
                <div class="blog-item text-start">
                    <div class="row align-items-center">
                        <div class="col-md-10">
                            <div class="mb-2">
                                <span class="label-pill">${post.kategori}</span>
                                <span class="small opacity-50 ms-2">${post.tanggal}</span>
                            </div>
                            <h2 class="fw-bold mb-3" style="font-size: 1.8rem;">${post.judul}</h2>
                            <p style="color: rgba(255,255,255,0.7); max-width: 700px;">${post.isi}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        })
        .catch(err => {
            console.error('Gagal ambil text:', err);
            document.getElementById('blog-container').innerHTML = '<p class="p-5">Gagal loading, lagi error.</p>';
        });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
